name: Build and Push PaaS Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: true
        default: "staging"
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: infra/docker/web.Dockerfile
          - name: admin
            dockerfile: infra/docker/admin.Dockerfile
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: worker
            dockerfile: infra/docker/worker.Dockerfile
          - name: crawler
            dockerfile: infra/docker/crawler.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
