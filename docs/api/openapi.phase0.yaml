openapi: 3.0.3
info:
  title: Bizboard API
  version: 0.1.0-phase0
  description: Initial API contract for Bizboard MVP.
servers:
  - url: https://api.bizboard.test/api/v1
    description: Local/Staging API
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200': { description: OK }

  /auth/request-otp:
    post:
      tags: [Auth]
      security: []
      summary: Request OTP for phone/email login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOtpDto'
      responses:
        '200': { description: OTP requested }

  /auth/verify-otp:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpDto'
      responses:
        '200':
          description: Auth tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /categories:
    get:
      tags: [Catalog]
      security: []
      summary: List product/business categories
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [product, business, service, content] }
        - in: query
          name: parentId
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }

  /products:
    get:
      tags: [Catalog]
      security: []
      summary: Search/list products
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: categorySlug
          schema: { type: string }
        - in: query
          name: brandSlug
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        '200':
          description: Product search result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductListResponse' }

  /products/{slug}:
    get:
      tags: [Catalog]
      security: []
      summary: Get product by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductDetail' }

  /products/{id}/offers:
    get:
      tags: [Offers]
      security: []
      summary: Get offers for a product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: availability
          schema: { type: string, enum: [in_stock, out_of_stock, preorder, unknown] }
      responses:
        '200':
          description: Offer list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProductOffer' }

  /businesses:
    post:
      tags: [Business]
      summary: Create business/mini-site draft
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBusinessDto' }
      responses:
        '201':
          description: Created business
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Business' }

  /businesses/{slug}:
    get:
      tags: [Business]
      security: []
      summary: Get business mini-site
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Business profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BusinessDetail' }

  /businesses/{id}/products:
    post:
      tags: [Business Catalog]
      summary: Merchant creates a product/offer manually
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMerchantProductDto' }
      responses:
        '201': { description: Product/offer created }

  /ai/conversations:
    post:
      tags: [AI]
      security: []
      summary: Start AI conversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                intent: { type: string, enum: [shopping, business_search, support, seo, business_dashboard] }
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiConversation' }

  /ai/conversations/{id}/messages:
    post:
      tags: [AI]
      security: []
      summary: Send message to AI assistant
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiUserMessageDto' }
      responses:
        '200':
          description: AI structured response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AiAssistantResponse' }

  /orders:
    post:
      tags: [Commerce]
      summary: Create order for internal checkout offer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderDto' }
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }

  /payments/{orderId}/attempts:
    post:
      tags: [Payments]
      summary: Create payment attempt and gateway redirect URL
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gateway]
              properties:
                gateway: { type: string, enum: [zarinpal, zibal] }
      responses:
        '201':
          description: Payment attempt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentAttempt' }

  /payments/callback/{gateway}:
    post:
      tags: [Payments]
      security: []
      summary: Gateway callback endpoint. Must verify server-to-server.
      parameters:
        - in: path
          name: gateway
          required: true
          schema: { type: string, enum: [zarinpal, zibal] }
      responses:
        '200': { description: Callback processed idempotently }

  /admin/products:
    get:
      tags: [Admin]
      summary: Admin product list
      responses:
        '200': { description: OK }

  /admin/raw-ingestion-items:
    get:
      tags: [Admin]
      summary: Review raw/imported crawler items
      responses:
        '200': { description: OK }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RequestOtpDto:
      type: object
      required: [destination, purpose]
      properties:
        destination: { type: string, example: '+989121234567' }
        purpose: { type: string, enum: [login, register, payment, kyc] }
    VerifyOtpDto:
      type: object
      required: [destination, code, purpose]
      properties:
        destination: { type: string }
        code: { type: string }
        purpose: { type: string }
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        roleHint: { type: string }
    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        parentId: { type: string, format: uuid, nullable: true }
        slug: { type: string }
        title: { type: string }
        categoryType: { type: string }
    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProductCard' }
        nextCursor: { type: string, nullable: true }
    ProductCard:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        title: { type: string }
        imageUrl: { type: string, nullable: true }
        minPrice: { type: number, nullable: true }
        maxPrice: { type: number, nullable: true }
        offerCount: { type: integer }
        ratingAvg: { type: number }
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductCard'
        - type: object
          properties:
            description: { type: string, nullable: true }
            aiSummary: { type: string, nullable: true }
            specs: { type: object }
            offers:
              type: array
              items: { $ref: '#/components/schemas/ProductOffer' }
    ProductOffer:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchantId: { type: string, format: uuid }
        price: { type: number }
        oldPrice: { type: number, nullable: true }
        currency: { type: string }
        availability: { type: string }
        internalCheckoutEnabled: { type: boolean }
        merchantProductUrl: { type: string, nullable: true }
        lastSeenAt: { type: string, format: date-time, nullable: true }
    CreateBusinessDto:
      type: object
      required: [name, businessType]
      properties:
        name: { type: string }
        slug: { type: string }
        businessType: { type: string }
        websiteUrl: { type: string, nullable: true }
    Business:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { type: string }
    BusinessDetail:
      allOf:
        - $ref: '#/components/schemas/Business'
        - type: object
          properties:
            shortDescription: { type: string }
            description: { type: string }
            contacts: { type: array, items: { type: object } }
            sections: { type: array, items: { type: object } }
    CreateMerchantProductDto:
      type: object
      required: [title, categoryId, price]
      properties:
        title: { type: string }
        categoryId: { type: string, format: uuid }
        brandId: { type: string, format: uuid, nullable: true }
        price: { type: number }
        availability: { type: string }
        internalCheckoutEnabled: { type: boolean }
        merchantProductUrl: { type: string, nullable: true }
    AiConversation:
      type: object
      properties:
        id: { type: string, format: uuid }
        intent: { type: string }
        status: { type: string }
    AiUserMessageDto:
      type: object
      required: [content]
      properties:
        content: { type: string, example: 'بهترین گوشی تا ۳۰ میلیون با دوربین خوب چی بخرم؟' }
        context: { type: object }
    AiAssistantResponse:
      type: object
      properties:
        text: { type: string }
        recommendedProducts:
          type: array
          items: { $ref: '#/components/schemas/ProductCard' }
        comparisonTable: { type: array, items: { type: object } }
        followUpQuestions: { type: array, items: { type: string } }
        filtersUsed: { type: object }
        confidence: { type: number }
        dataFreshnessNote: { type: string }
    CreateOrderDto:
      type: object
      required: [offerId, quantity, shippingAddress]
      properties:
        offerId: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        shippingAddress: { type: object }
        customerNote: { type: string }
    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        totalAmount: { type: number }
        currency: { type: string }
    PaymentAttempt:
      type: object
      properties:
        id: { type: string, format: uuid }
        gateway: { type: string }
        status: { type: string }
        redirectUrl: { type: string }
